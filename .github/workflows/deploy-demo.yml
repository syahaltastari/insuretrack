name: Deploy Demo

# Auto-deploy ke Dokploy setelah CI tests pass + image build sukses.
#
# Flow lengkap per push:
#   1. push ke main/dev → CI workflow jalan (tests)
#   2. CI selesai → build workflow trigger, build image + push ke GHCR
#   3. Build selesai → workflow ini trigger (workflow_run)
#   4. Trigger Dokploy API → Dokploy pull image baru dari GHCR
#   5. Verify dengan health check
#
# VPS TIDAK compile apa-apa — CPU idle saat deploy. Image sudah pre-built
# di GitHub Actions runner (zero beban di VPS Anda).
#
# Setup sekali:
#   1. Di Dokploy panel → Settings → Profile → API → Generate API Key
#   2. Copy "Compose ID" dari URL service di Dokploy
#   3. Pastikan Dokploy Compose service point ke `docker-compose.ghcr.yml`
#      (bukan `docker-compose.yml` — yang baru pakai `image:` dari GHCR)
#   4. GitHub repo → Settings → Secrets and variables → Actions → New:
#      - DOKPLOY_API_KEY      (value: API key dari step 1)
#      - DOKPLOY_URL          (value: http://<IP-VPS>:3000)
#      - DOKPLOY_COMPOSE_ID   (value: compose ID dari step 2)
#      - DEPLOY_HEALTH_URL    (value: http://api.<DOMAIN>.sslip.io/health)
#
# Branch behavior:
#   - push ke main/dev → CI → build → deploy
#   - PR ke main → tidak deploy (cuma CI test)
#   - workflow_dispatch → manual trigger (rollback / redeploy)

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    # `branches: [main, dev]` WAJIB eksplisit. Tanpa filter ini, GitHub
    # Actions default-nya HANYA fire untuk run di **default branch**
    # (= `main` di repo ini). Build di `dev` akan di-skip → deploy
    # otomatis terputus di dev tapi jalan di main.
    #
    # Polling fallback di job `ci-gate` di-bawah juga akan gagal dengan
    # pesan "Build workflow belum jalan" kalau filter ini missing.
    branches: [main, dev]
  workflow_dispatch:
    # Manual trigger dari GitHub Actions UI — untuk rollback / redeploy manual

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  # ---- Job 1: Wait for CI tests to pass ----
  ci-gate:
    name: Wait for CI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for build workflow to complete
        uses: actions/github-script@v7
        with:
          script: |
            // Manual dispatch → skip wait (user already verified CI manually)
            if (process.env.GITHUB_EVENT_NAME === 'workflow_dispatch') {
              core.notice('Manual dispatch — skipping build wait');
              return;
            }

            // Tunggu build workflow yang di-trigger workflow_run
            // (event ini set setelah build workflow SELESAI)
            if (context.payload.workflow_run) {
              const run = context.payload.workflow_run;
              core.info(`Build workflow ${run.conclusion}: ${run.html_url}`);
              if (run.conclusion !== 'success') {
                throw new Error(`Build workflow gagal: ${run.conclusion}`);
              }
              core.info('Build passed ✓');
              return;
            }

            // Fallback: poll (kalau trigger via workflow_run tidak firkan payload)
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              status: 'completed',
              branch: context.ref,
              per_page: 1,
            });
            if (!data.workflow_runs.length) {
              core.setFailed('Build workflow belum jalan — push ke GHCR belum dilakukan');
              return;
            }
            const lastRun = data.workflow_runs[0];
            if (lastRun.conclusion !== 'success') {
              throw new Error(`Build workflow gagal: ${lastRun.conclusion}`);
            }
            core.info(`Build passed: ${lastRun.html_url}`);

  # ---- Job 2: Trigger Dokploy redeploy ----
  deploy:
    name: Trigger Dokploy redeploy
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ] || [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_COMPOSE_ID" ]; then
            echo "::error::Missing Dokploy secrets. Setup di GitHub repo Settings → Secrets:"
            echo "  - DOKPLOY_URL (e.g. http://203.0.113.42:3000)"
            echo "  - DOKPLOY_API_KEY (generate di Dokploy panel → Profile → API)"
            echo "  - DOKPLOY_COMPOSE_ID (copy dari URL service)"
            exit 1
          fi
          echo "Triggering redeploy of compose $DOKPLOY_COMPOSE_ID on $DOKPLOY_URL..."
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$DOKPLOY_URL/api/compose.redeploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"composeId\": \"$DOKPLOY_COMPOSE_ID\", \"title\": \"Deploy from GitHub Actions\", \"description\": \"Commit ${{ github.sha }}\"}")
          echo "$response"
          http_code=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
          if [ "$http_code" != "200" ]; then
            echo "::error::Dokploy API returned HTTP $http_code"
            exit 1
          fi
          echo "✓ Dokploy redeploy triggered"

  # ---- Job 3: Health check post-deploy ----
  verify:
    name: Verify deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to come up
        env:
          DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          if [ -z "$DEPLOY_HEALTH_URL" ]; then
            echo "::warning::DEPLOY_HEALTH_URL not set — skipping health check"
            exit 0
          fi
          echo "Waiting up to 5 menit untuk services ready..."
          for i in $(seq 1 30); do
            sleep 10
            response=$(curl -sS -o /dev/null -w "%{http_code}" "$DEPLOY_HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$response" = "200" ]; then
              echo "✓ $DEPLOY_HEALTH_URL returned 200"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $response — waiting..."
          done
          echo "::error::Health check gagal setelah 5 menit. Cek Dokploy logs."
          exit 1

      - name: Smoke test all surfaces
        env:
          PORTAL_URL: ${{ secrets.PORTAL_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          # Default ke health URL pattern kalau tidak di-set
          : "${PORTAL_URL:=${DEPLOY_HEALTH_URL%/api/health}}"
          : "${API_URL:=${DEPLOY_HEALTH_URL%/health}}"
          : "${ADMIN_URL:=${PORTAL_URL/admin./admin.}}"

          for label in "Portal:$PORTAL_URL" "Admin:$ADMIN_URL" "API:$API_URL/health"; do
            name="${label%%:*}"
            url="${label##*:}"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "✓ $name ($url) → $code"
            else
              echo "::warning::$name ($url) → $code (might be SPA — verify in browser)"
            fi
          done
