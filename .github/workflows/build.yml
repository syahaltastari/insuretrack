name: Build & Push Images

# Build 3 Docker images paralel + push ke GitHub Container Registry (GHCR).
#
# Flow lengkap per push:
#   1. push ke main/dev
#   2. CI workflow jalan (cargo test + pnpm test + playwright)
#   3. Build workflow ini trigger via workflow_run SETELAH CI selesai
#   4. Build 3 image (backend, portal, admin) paralel
#   5. Push ke ghcr.io/syahaltastari/insuretrack-{backend,portal,admin}:latest
#   6. deploy-demo workflow trigger, call Dokploy API
#   7. Dokploy pull image baru dari GHCR, restart container
#
# VPS TIDAK BUILD APAPA — CPU 0% saat deploy. Build compute jalan di
# GitHub-hosted runner (4 vCPU, 16 GB RAM, gratis untuk public repo).
#
# Image tag strategy:
#   - :latest        ← setiap push (rolling, dipakai Dokploy)
#   - :git-<sha>     ← immutable, untuk rollback manual via Dokploy UI
#
# Setup sekali di GitHub repo:
#   Settings → Actions → General → Workflow permissions:
#     ✅ "Read and write permissions"
#     ✅ "Allow GitHub Actions to create and approve pull requests"
#   (default di kebanyakan repo udah OK)
#
# Image visibility:
#   - Public repo → image public otomatis (siap dishare)
#   - Private repo → image private by default (perlu login di Dokploy VPS)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # `branches: [main, dev]` WAJIB eksplisit. Tanpa filter ini, GitHub
    # Actions default-nya HANYA fire untuk run di **default branch**
    # (= `main` di repo ini). Push ke `dev` akan di-skip diam-diam —
    # itulah sebabnya chain CI → build terputus di dev tapi jalan di main.
    #
    # (Catatan histori: versi sebelumnya pakai `branches: [main]` lalu
    # dihapus karena dianggap unreliable. Tapi tanpa filter sama sekali
    # justru lebih ketat — default-nya default-branch-only. Solusi:
    # tulis branch list secara eksplisit.)
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-images
  cancel-in-progress: true

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    # Hanya jalan kalau:
    # - manual trigger (workflow_dispatch), ATAU
    # - CI workflow sukses conclusion
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # `actions: read` WAJIB explicit — `workflow_run` event butuh ini
    # untuk baca payload (termasuk `conclusion` field di `if:` check).
    # Tanpa di-explicit, default token permissions di-override dan event
    # tidak fire sama sekali (workflow tidak muncul di tab Actions).
    permissions:
      contents: read
      actions: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./apps/backend
            dockerfile: ./apps/backend/Dockerfile
          - service: portal
            context: .
            dockerfile: ./apps/portal/Dockerfile
          - service: admin
            context: .
            dockerfile: ./apps/admin/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/insuretrack-${{ matrix.service }}
          tags: |
            # Tag immutable per commit — untuk rollback
            type=sha,prefix=git-,format=short
            # Tag rolling — dipakai Dokploy. Build workflow hanya trigger
            # via `workflow_run` dari CI (yang listen ke main + dev saja),
            # jadi :latest otomatis hanya di-apply untuk main/dev push.
            # Branch lain (feature/eksperimen) TIDAK trigger Build, jadi
            # :latest tidak akan ter-set untuk mereka.
            #
            # Tanpa `enable` filter karena parser LiquidJS docker/metadata-action
            # tidak support compound expression (`||`, `env.GITHUB_REF`,
            # `contains(branch, ...)`) — selalu parse error. `enable` filter
            # jadi redundant: trigger workflow sendiri sudah jadi filter.
            #
            # Trade-off: kalau ada manual `workflow_dispatch` di branch lain
            # (mis. eksperimen), :latest akan ter-set untuk branch itu. Bisa
            # di-mitigate dengan `branches:` filter di workflow_run kalau
            # dibutuhkan strict isolation.
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=InsureTrack ${{ matrix.service }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Proprietary

      - name: Verify secret received
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "::error::Secret NEXT_PUBLIC_API_URL is EMPTY or NOT SET"
            echo "::error::This will cause the image to fall back to localhost:8080/api"
            echo "::error::Check: Settings → Secrets and variables → Actions (REPO scope)"
            exit 1
          else
            echo "✓ Secret received, length=${#NEXT_PUBLIC_API_URL}"
            echo "✓ First 30 chars: ${NEXT_PUBLIC_API_URL:0:30}..."
            echo "✓ Will pass as build-arg to Docker"
          fi

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # `NEXT_PUBLIC_*` di-bake ke client bundle saat build. Wajib di-pass
          # sebagai build-arg, kalau tidak ENV di Dockerfile jadi kosong dan
          # bundle fallback ke "http://localhost:8080/api" — browser fetch
          # ke localhost (PC user), bukan ke VPS via Traefik.
          #
          # `BACKEND_URL` (tanpa NEXT_PUBLIC_) TIDAK di-pass di sini karena
          # dia runtime env, di-set via Dokploy Secrets → di-inject ke
          # container saat docker compose up. Dipakai untuk SSR/RSC fetch
          # dari dalam container (Docker service name `backend:8080`).
          #
          # Backend (Rust) tidak pakai arg ini — Dockerfile-nya tidak
          # declare ARG, jadi Docker silently ignore. Aman di-pass.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          # Cache layers di GitHub Actions — second build jauh lebih cepat
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Matikan SLSA provenance (overhead tanpa benefit untuk internal app)
          provenance: false

      - name: Image digest (untuk reference di deploy)
        if: matrix.service == 'backend'
        run: |
          echo "Backend image digest:"
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/insuretrack-backend:git-${{ github.sha }} --raw | head -1
