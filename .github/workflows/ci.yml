name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Hindari double-fire pada PR + push ke branch yang sama.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: feralyth21
          POSTGRES_DB: insuretrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/backend -> target"
      - name: Format check
        working-directory: apps/backend
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        working-directory: apps/backend
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests
        working-directory: apps/backend
        run: cargo test --lib
      - name: Integration tests (real Postgres)
        working-directory: apps/backend
        env:
          TEST_DATABASE_URL: postgres://postgres:feralyth21@localhost:5432/insuretrack_test
        run: cargo test --tests

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Vitest (unit + component)
        run: pnpm test
      - name: Playwright (E2E)
        env:
          E2E_SKIP_SERVER: "1"
        run: pnpm exec playwright install --with-deps chromium && pnpm exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
