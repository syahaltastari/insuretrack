name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Hindari double-fire pada PR + push ke branch yang sama.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: feralyth21
          POSTGRES_DB: insuretrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Pin ke Rust 1.92 — match dengan Dockerfile lokal
          # (`rust:1.92-slim-bookworm`). Dependencies baru (aws-sdk 1.135+,
          # icu 2.2+, time 0.3.47+) butuh rustc ≥ 1.91.1.
          #
          # Toolchain bawah (1.85, 1.88) gagal di clippy dengan error
          # "rustc 1.85.1 is not supported by aws-config@1.8.18 ...".
          # 1.92 = match Dockerfile = reproducible.
          #
          # Note: `rust-version = "1.75"` di Cargo.toml adalah metadata
          # minimum, bukan blocker — pakai Rust lebih baru selalu OK.
          toolchain: "1.92"
          # rustfmt + clippy tidak otomatis di-install di GH Actions image
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./apps/backend -> target"
      - name: Format check
        working-directory: apps/backend
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        working-directory: apps/backend
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests
        working-directory: apps/backend
        run: cargo test --lib
      - name: Integration tests (real Postgres)
        working-directory: apps/backend
        env:
          TEST_DATABASE_URL: postgres://postgres:feralyth21@localhost:5432/insuretrack_test
        run: cargo test --tests

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Pakai version eksplisit yang match package.json `packageManager`
        # field — kalau pakai `version: 10` saja, pnpm akan complain
        # "Multiple versions specified" dan tidak bisa resolve.
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Vitest (unit + component)
        run: pnpm test
      - name: Playwright (E2E)
        env:
          # Pakai `next start` (production) — `pnpm build` di step
          # sebelumnya sudah produce artifact, jadi start ~3-5s vs 30-60s
          # untuk dev server. Backend tidak di-spawn di CI ini — test
          # admin login "wrong credentials" tetap jalan karena FE
          # tampilkan error alert saat backend unreachable.
          E2E_USE_PROD: "1"
        run: pnpm exec playwright install --with-deps chromium && pnpm exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
