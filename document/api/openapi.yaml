  /admin/claims:
    get:
      tags: [Admin Backoffice]
      summary: List all claims (admin view)
      operationId: adminListClaims
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Paginated list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AdminClaimRow" }

  /admin/claims/{id}:
    patch:
      tags: [Admin Backoffice]
      summary: Update claim status (review workflow)
      description: |
        Updates `status` and (optionally) `decision_note` and
        `claim_type`. The status transition must be valid per the
        claim state machine:

        - `SUBMITTED → UNDER_REVIEW`
        - `UNDER_REVIEW → APPROVED`
        - `APPROVED → PAID`
        - `SUBMITTED | UNDER_REVIEW → REJECTED`

        Invalid transitions return 400. Sends a `CLAIM_STATUS_UPDATE`
        email to the customer. Transitioning to `PAID` requires a prior
        `POST /admin/claims/{id}/payment-proof` upload; this endpoint
        only flips the status (it does not re-upload the proof).

        `claim_type` is an admin override for the system-determined
        type (see ClaimRow). Use it to correct the auto-set type
        when needed (e.g. LIFE policy where the claim is actually
        MATURITY or SURRENDER, not DEATH). Omit to leave unchanged.
      operationId: adminPatchClaim
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchClaimRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminClaimRow" }
        "400":
          description: Illegal state transition.
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/claims/{id}/payment-proof:
    post:
      tags: [Admin Backoffice]
      summary: Upload payment proof for a claim (used when marking as PAID)
      description: |
        Multipart upload. `proof` is the proof file (JPG / PNG / PDF,
        max 5 MB). Stored at `payment_proofs/{claim_id}/{filename}`
        in the storage abstraction (local FS or R2). The returned
        `payment_proof_path` must be sent in a subsequent
        `PATCH /admin/claims/{id}` call (the PATCH does not upload
        the file itself; it just records the storage key).

        Audit event: `claim_payment_proof_uploaded`.
      operationId: adminUploadClaimPaymentProof
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [proof]
              properties:
                proof: { type: string, format: binary, description: "JPG/PNG/PDF, max 5 MB" }
      responses:
        "200":
          description: Proof uploaded; returns the updated claim row including `payment_proof_path`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminClaimRow" }
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Invalid file (wrong MIME or > 5 MB).
          $ref: "#/components/responses/ValidationError"

  /admin/inquiries:
    get:
      tags: [Admin Backoffice]
      summary: List all inquiries
      operationId: adminListInquiries
      parameters:
        - $ref: "#/components/parameters/Page"
