          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminInquiryRow" }
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: "Inquiry already closed."
          $ref: "#/components/responses/ValidationError"

