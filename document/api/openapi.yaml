      operationId: adminGetInquiry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AdminInquiryRow"
                  - type: object
                    required: [messages]
                    properties:
                      messages:
                        type: array
                        items: { $ref: "#/components/schemas/MessageRow" }
                      last_message_at: { type: string, format: date-time, nullable: true }
                      last_sender_type: { type: string, enum: [CUSTOMER, ADMIN], nullable: true }
                      closed_at: { type: string, format: date-time, nullable: true }
                      last_message_preview: { type: string, nullable: true }
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/inquiries/{id}/messages:
    post:
      tags: [Admin Backoffice]
      summary: Reply to an inquiry thread (add an admin message)
      description: |
        Inserts a new message with `sender_type=ADMIN`, sets the
        inquiry's `last_message_at` and `last_sender_type=ADMIN`, and
        flips status to `ANSWERED`. Sends an `INQUIRY_RESPONSE` email
        to the customer.
      operationId: adminInquiryMessage
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMessageRequest" }
      responses:
        "200":
          description: Updated inquiry with the new message appended.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AdminInquiryRow"
                  - type: object
                    required: [messages]
                    properties:
                      messages:
                        type: array
                        items: { $ref: "#/components/schemas/MessageRow" }
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: "Inquiry already closed."
          $ref: "#/components/responses/ValidationError"

  /admin/inquiries/{id}/close:
    post:
      tags: [Admin Backoffice]
      summary: Close an inquiry (manual, by admin)
      description: |
        Sets `status=CLOSED` and `closed_at=now()`. Audit event:
        `inquiry_closed_by_admin`.
      operationId: adminCloseInquiry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
