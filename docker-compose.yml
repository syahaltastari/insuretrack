# =============================================================================
# InsureTrack — Docker Compose
#
# 4 service (db, backend, portal, admin), direct port mapping, no proxy lokal.
#
# Quick start (lokal):
#   cp .env.example .env
#   docker compose up -d --build
#   → http://localhost:3000  (portal customer)
#   → http://localhost:3001  (admin backoffice)
#   → http://localhost:8080/api (backend)
#   → postgresql://localhost:5433 (psql dari host)
#
# Deploy ke VPS + Dokploy: lihat document/deployment/RUNBOOK_VPS_DEV.md.
# Traefik labels di bawah aktif saat Traefik hadir (Dokploy); di lokal
# Traefik tidak jalan, label diabaikan. Entry point `web` (HTTP 80) karena
# Dev belum pakai SSL — saat migrasi ke HTTPS ganti `web` → `websecure`
# dan tambah `tls.certresolver=letsencrypt` (lihat document/deployment/DEPLOYMENT.md §6.2).
#
# Reset: docker compose down -v  ← HAPUS VOLUME, data hilang.
# =============================================================================

services:
  # ---- Postgres ------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: insuretrack_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 127.0.0.1: psql dari host saat lokal. Di Dokploy binding ini tetap
    # aman (hanya listen di localhost VPS), backend akses via service name.
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend (Rust + Axum) -----------------------------------------------
  backend:
    build: ./apps/backend
    container_name: insuretrack_backend
    env_file: .env
    # `db` = service name Postgres di Docker network (otomatis resolve).
    # `localhost` di dalam container = container itu sendiri, BUKAN host.
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - backend_uploads:/var/uploads
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  # ---- Portal (Next.js customer surface) ----------------------------------
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        # NEXT_PUBLIC_* di-bake ke client bundle saat build, bukan runtime.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      # BACKEND_URL: untuk Next.js SSR/RSC fetch dari dalam container.
      # Harus pakai service name `backend` (Docker internal DNS), BUKAN
      # `localhost` (= container itu sendiri) atau public URL (tidak
      # resolve dari dalam network). Wajib di-set di Dokploy Secrets juga.
      BACKEND_URL: http://backend:8080
    container_name: insuretrack_portal
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"

  # ---- Admin (Next.js backoffice) -----------------------------------------
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      # BACKEND_URL: untuk Next.js SSR/RSC fetch dari dalam container.
      # Wajib di-set di Dokploy Secrets juga (lihat document/deployment/RUNBOOK_VPS_DEV.md).
      BACKEND_URL: http://backend:8080
    container_name: insuretrack_admin
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"

volumes:
  pgdata:
  backend_uploads:
